<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function() {
      try {
        var theme = localStorage.getItem('noura_theme');
        if (theme === 'dark') document.documentElement.classList.add('dark');
      } catch (e) {
        // ignore
      }
    })();
  </script>
  <script>
    (function() {
      var l = window.location;
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function(s) {
          return s.replace(/~and~/g, '&');
        }).join('?');
        window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
      }
    })();
  </script>
  <meta charset="utf-8" />
<link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#0066FF" />
<meta
name="description"
content="NOURA AI - Neural Oncology Universal Risk Assessment. Egyptian innovation in AI-powered cancer screening and medical intelligence."
/>
<meta name="keywords" content="cancer, AI detection, medical imaging, early detection, NOURA AI, Egypt, healthcare" />
<meta name="author" content="NOURA AI Team" />
<meta property="og:title" content="NOURA AI - Medical Intelligence System" />
<meta property="og:description" content="AI-powered cancer screening and medical intelligence system" />
